<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WC 2026</title>
<meta name="description" content="Live 2026 FIFA World Cup scores, schedules, groups and TV listings"/>
<meta name="theme-color" content="#0a2416"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WC 2026"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" id="pwa-manifest"/>
<link rel="apple-touch-icon" id="apple-icon"/>
<link rel="icon" id="favicon"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eceae5;
  --tx:#1c1c1a;--tx2:#6b6b67;--tx3:#9b9b96;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --r:8px;--rl:12px;--font:system-ui,-apple-system,sans-serif;
}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg2);min-height:100vh;color:var(--tx)}
.app{max-width:680px;margin:0 auto;padding:14px 12px 80px}

/* HERO */
.hero{background:#0a2416;border-radius:var(--rl);padding:14px 16px 13px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;border:28px solid rgba(255,255,255,0.04);pointer-events:none}
.hero-flags{display:flex;gap:5px;margin-bottom:7px}
.hf{font-size:17px;opacity:.85}
.hero h1{font-size:16px;font-weight:500;color:#fff}
.hero-sub{font-size:11px;color:rgba(255,255,255,.42);margin-top:3px}
.hero-date{font-size:12px;color:rgba(255,255,255,.62);margin-top:7px;font-weight:500}
.hero-pill{display:inline-block;background:rgba(52,211,153,.14);color:#6ee7b7;font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;border:0.5px solid rgba(52,211,153,.28);margin-top:6px}
.live-bar{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:9px;border-top:0.5px solid rgba(255,255,255,.1)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.live-txt{font-size:11px;color:rgba(255,255,255,.65);flex:1}
.live-refresh{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-size:10px;padding:3px 9px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font)}
.live-refresh:hover{background:rgba(255,255,255,.18)}
.live-refresh i{font-size:12px}
.live-refresh.spin i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABS */
.tabs{display:flex;margin-bottom:14px;border:0.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;background:var(--bg2)}
.tab{flex:1;padding:9px 4px 7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);text-align:center;border:none;border-bottom:2px solid transparent;background:transparent;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;font-family:var(--font)}
.tab:hover{color:var(--tx)}
.tab.on{background:transparent;color:var(--tx);border-bottom:2px solid #2d7a4f;font-weight:500}
.tab.on i{color:#2d7a4f}
.tab i{font-size:14px}

/* VIEWS */
.view{display:none}.view.on{display:block}
.sec-label{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin:0 0 8px;padding-top:2px}

/* MATCH CARD */
.mc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:12px 14px 10px;margin-bottom:9px}
.mc.feat{border-color:#0a2416;border-width:1px}
.mc.live-card{border-color:#dc2626;border-width:1px}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.mc-grp{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}
.bdg{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px}
.bdg-up{background:var(--bg2);color:var(--tx2)}
.bdg-live{background:#fef2f2;color:#991b1b;animation:pulse 1.8s infinite}
.bdg-ft{background:#f0fdf4;color:#166534}
.mc-body{display:flex;align-items:center}
.mc-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 2px;border-radius:var(--r);transition:background .12s}
.mc-team:hover{background:var(--bg2)}
.mc-flag{font-size:26px;line-height:1}
.mc-name{font-size:11px;font-weight:500;color:var(--tx);text-align:center;line-height:1.3}
.mc-name-hint{font-size:9px;color:var(--tx3);margin-top:1px}
.mc-mid{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:62px;padding:0 4px}
.mc-score{font-size:24px;font-weight:500;color:var(--tx);letter-spacing:3px}
.mc-time{font-size:13px;font-weight:500;color:var(--tx)}
.mc-vs{font-size:10px;color:var(--tx3)}
.mc-foot{margin-top:9px;padding-top:8px;border-top:0.5px solid var(--bd);display:flex;flex-direction:column;gap:5px}
.mc-venue{font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.mc-venue i{font-size:13px;flex-shrink:0;color:var(--tx3)}
.mc-watch{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.wl{font-size:10px;color:var(--tx3)}
.chip{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.ce{background:#e8f4ea;color:#14532d;border:0.5px solid #86efac}
.cs{background:#fff7ed;color:#7c2d12;border:0.5px solid #fdba74}
.cst{background:#eff6ff;color:#1e3a8a;border:0.5px solid #93c5fd}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--tx2);font-size:13px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--tx3)}

/* SEARCH */
.s-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.s-row input{flex:1;padding:10px 12px;font-size:13px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none;font-family:var(--font)}
.s-row input:focus{border-color:#0a2416}
.s-row button{padding:10px 14px;background:#0a2416;color:#fff;border:none;border-radius:var(--r);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font)}
.sdrop{background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.sdrop-item{padding:10px 14px;border-bottom:0.5px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.sdrop-item:last-child{border-bottom:none}
.sdrop-item:hover{background:var(--bg2)}
.sdrop-flag{font-size:20px}
.sdrop-name{font-size:13px;font-weight:500;color:var(--tx)}
.sdrop-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.team-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--bd)}
.team-hdr-flag{font-size:32px}
.team-hdr h2{font-size:15px;font-weight:500;color:var(--tx)}
.team-hdr p{font-size:12px;color:var(--tx2);margin-top:2px}
.back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);cursor:pointer;padding:5px 9px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);margin-bottom:12px}
.back:hover{background:var(--bg2)}

/* GROUPS */
.g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;margin-bottom:4px}
.gcard{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:10px 12px;cursor:pointer;transition:border-color .14s}
.gcard:hover{border-color:#0a2416}
.gcard-lbl{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.gcard-team{display:flex;align-items:center;gap:6px;padding:3px 0}
.gcard-team:hover .gtn{color:#0a2416;text-decoration:underline}
.gtf{font-size:15px}
.gtn{font-size:12px;color:var(--tx)}
.grp-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.gtab{padding:5px 10px;font-size:11px;cursor:pointer;color:var(--tx2);background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);font-weight:500;font-family:var(--font)}
.gtab.on{background:#0a2416;color:#fff;border-color:#0a2416}

/* STANDINGS TABLE */
.s-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px}
.s-tbl th{text-align:left;padding:5px 8px;color:var(--tx3);font-weight:500;border-bottom:0.5px solid var(--bd2);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.s-tbl td{padding:6px 8px;border-bottom:0.5px solid var(--bd);color:var(--tx)}
.s-tbl tr:last-child td{border-bottom:none}
.s-tbl tr.adv td:first-child{border-left:2px solid #16a34a}
.s-tbl tr.maybe td:first-child{border-left:2px solid #ca8a04}
.pn{color:var(--tx3);font-size:11px}

/* WATCH GUIDE */
.wg{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:12px}
.wg h3{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.wg h3 i{font-size:15px;color:var(--tx3)}
.wr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--bd)}
.wr:last-child{border-bottom:none}
.wn{font-size:13px;font-weight:500;color:var(--tx)}
.wd{font-size:11px;color:var(--tx2);margin-top:2px}
.wtag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap;margin-left:10px;flex-shrink:0;align-self:flex-start;margin-top:2px}

/* LIVE SCORES OVERLAY */
.live-scores-banner{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:6px}
.live-scores-banner i{font-size:14px;color:#0a2416}
.error-banner{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:#991b1b}

/* STICKY SEARCH BAR */
.sticky-search{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--bd);padding:8px 12px 14px;z-index:200;display:none}
.sticky-search .s-row{max-width:680px;margin:0 auto;margin-bottom:0}

/* PWA INSTALL BANNER */
.install-banner{display:none;align-items:center;gap:10px;background:#0a2416;color:#fff;padding:10px 14px;border-radius:var(--rl);margin-bottom:12px;font-size:13px}
.install-banner.show{display:flex}
.install-banner-icon{font-size:22px;flex-shrink:0}
.install-banner-txt{flex:1;line-height:1.4}
.install-banner-txt strong{font-weight:500;display:block;margin-bottom:1px}
.install-banner-txt span{font-size:11px;color:rgba(255,255,255,.6)}
.install-banner-btn{background:#fff;color:#0a2416;border:none;border-radius:var(--r);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.install-banner-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0 0 0 4px;line-height:1}
</style>
</head>

</div>

// ─── LIVE SCORE STATE ────────────────────────────────────────────────
let liveData = {}; // id -> {sc, status, minute}
let lastFetch = null;
let fetchError = null;

async function fetchLiveScores() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const statusEl = document.getElementById('live-status');
  btn.disabled = true;
  icon.classList.add('spin');
  statusEl.textContent = 'Fetching live scores…';
  fetchError = null;

  try {
    const today = todayStr();
    const prompt = `You are a live sports data assistant. Today is ${today}. 
Search for the current 2026 FIFA World Cup scores and match statuses for today's matches.
Return ONLY a JSON array with this exact structure, no other text:
[{"id":"can-bih-0612","home":"Canada","away":"Bosnia and Herzegovina","score":"1-0","status":"ft","minute":null},...]

Status values: "sched" (not started), "live" (in progress), "ft" (final/full time), "ht" (half time)
Include minute (e.g. 67) when live, null otherwise.
Include ALL World Cup matches played on ${today} and any currently live.
If a match has not been played yet today, use status "sched" and score null.
IDs use format: first3lettersHome-first3lettersAway-MMDD (e.g. can-bih-0612 for Canada vs Bosnia on June 12).
Only return the JSON array, nothing else.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        tools: [{type: 'web_search_20250305', name: 'web_search'}],
        messages: [{role: 'user', content: prompt}]
      })
    });

    if (!resp.ok) throw new Error(`API ${resp.status}`);
    const data = await resp.json();

    // Extract text from response
    let rawText = '';
    for (const block of data.content) {
      if (block.type === 'text') rawText += block.text;
    }

    // Parse JSON from response
    const jsonMatch = rawText.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const results = JSON.parse(jsonMatch[0]);

    // Merge into liveData
    liveData = {};
    for (const r of results) {
      if (r.id) liveData[r.id] = r;
    }

    // Also try to match by team names if id not found
    for (const r of results) {
      if (!r.id && r.home && r.away) {
        const match = MATCHES.find(m =>
          m.h.toLowerCase().includes(r.home.toLowerCase().slice(0,4)) ||
          r.home.toLowerCase().includes(m.h.toLowerCase().slice(0,4))
        );
        if (match) liveData[match.id] = r;
      }
    }

    lastFetch = new Date();
    const liveCount = results.filter(r => r.status === 'live').length;
    const ftCount = results.filter(r => r.status === 'ft').length;

    if (liveCount > 0) {
      statusEl.textContent = `${liveCount} match${liveCount>1?'es':''} live · Updated ${lastFetch.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    } else if (ftCount > 0) {
      statusEl.textContent = `${ftCount} match${ftCount>1?'es':''} completed today · Updated ${lastFetch.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    } else {
      statusEl.textContent = `Live · Updated ${lastFetch.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    }

    renderToday();
    if (activeView === 'search' && currentTeam) showTeam(currentTeam);
    if (activeView === 'groups' && selGroup) renderGroupBody(selGroup);

  } catch(e) {
    fetchError = e.message;
    statusEl.textContent = 'Could not fetch live data — showing scheduled times';
    console.error('Live fetch error:', e);
  }

  icon.classList.remove('spin');
  btn.disabled = false;
}

// ─── HELPERS ─────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getMatchStatus(m) {
  const live = liveData[m.id];
  if (live) return live;
  return {sc: m.sc, status: m.status, minute: null};
}

function mcHTML(m, feat, showTeamLink) {
  const live = getMatchStatus(m);
  const s = live.status || m.status;
  const score = live.sc || m.sc;
  const bCls = s==='live'?'bdg-live': s==='ft'||s==='ht'?'bdg-ft':'bdg-up';
  const bTxt = s==='live'?(live.minute?`${live.minute}'`:'Live'): s==='ft'?'Full Time': s==='ht'?'Half Time': m.t;
  const midContent = (s==='ft'||s==='ht'||s==='live') && score
    ? `<span class="mc-score">${score}</span>`
    : `<div><div class="mc-time">${m.t}</div><div class="mc-vs">vs</div></div>`;
  const tvchs = m.tv.map(x=>`<span class="chip ce">${x}</span>`).join('');
  const spchs = m.tvs.map(x=>`<span class="chip cs">${x}</span>`).join('');
  const strchs = m.str.map(x=>`<span class="chip cst">${x}</span>`).join('');
  const teamClick = showTeamLink ? 'onclick="goTeamFromToday(this)"' : `onclick="go('search');showTeam(this.dataset.team)"`;
  const hintH = showTeamLink ? `<span class="mc-name-hint">tap for schedule</span>` : '';
  const hintA = showTeamLink ? `<span class="mc-name-hint">tap for schedule</span>` : '';

  return `<div class="mc${feat?' feat':''}${s==='live'?' live-card':''}">
  <div class="mc-top"><span class="mc-grp">Group ${m.g}</span><span class="bdg ${bCls}">${bTxt}</span></div>
  <div class="mc-body">
    <div class="mc-team" data-team="${m.h}" ${teamClick}><span class="mc-flag">${FLAGS[m.h]||'🏳️'}</span><span class="mc-name">${m.h}</span>${hintH}</div>
    <div class="mc-mid">${midContent}</div>
    <div class="mc-team" data-team="${m.a}" ${teamClick}><span class="mc-flag">${FLAGS[m.a]||'🏳️'}</span><span class="mc-name">${m.a}</span>${hintA}</div>
  </div>
  <div class="mc-foot">
    <div class="mc-venue"><i class="ti ti-map-pin"></i>${m.v} · ${m.c}</div>
    <div class="mc-watch"><span class="wl">English:</span>${tvchs}&nbsp;<span class="wl">Spanish:</span>${spchs}&nbsp;<span class="wl">Stream:</span>${strchs}</div>
  </div>
</div>`;
}

function goTeamFromToday(el) {
  const team = el.dataset.team;
  go('search');
  showTeam(team);
}

// ─── TODAY VIEW ───────────────────────────────────────────────────────
function renderToday() {
  const el = document.getElementById('v-today');
  const td = todayStr();
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const todayMs = MATCHES.filter(m => m.d === td);

  let html = '';
  if (fetchError) html += `<div class="error-banner"><i class="ti ti-wifi-off" style="margin-right:6px"></i>Live scores unavailable — check your connection and tap Refresh</div>`;

  if (todayMs.length) {
    const feat = todayMs.find(m => m.h==='United States'||m.a==='United States');
    html += todayMs.map(m => mcHTML(m, m===feat, true)).join('');
  } else {
    html += '<div class="empty"><i class="ti ti-calendar-off"></i>No matches scheduled for today.</div>';
  }

  el.innerHTML = html;
}

// ─── SEARCH VIEW ──────────────────────────────────────────────────────
let currentTeam = null;

function onSearchInput(v) {
  // Sync both inputs
  document.getElementById('sinput').value = v;
  document.getElementById('sinput2').value = v;

  const q = v.trim().toLowerCase();
  const drop = document.getElementById('sdrop');
  const res  = document.getElementById('sresult');

  if (!q) {
    drop.innerHTML = '';
    res.innerHTML = '<div class="empty"><i class="ti ti-globe"></i>Type a country name to see their schedule and where to watch.</div>';
    currentTeam = null;
    return;
  }

  const hits = Object.keys(FLAGS).filter(t => t.toLowerCase().includes(q));

  // Always show dropdown if there are multiple hits
  if (hits.length > 1) {
    drop.innerHTML = '<div class="sdrop">' + hits.slice(0, 8).map(t =>
      `<div class="sdrop-item" onclick="pickTeam('${t.replace(/'/g,"\\'")}')">
        <span class="sdrop-flag">${FLAGS[t]}</span>
        <div><div class="sdrop-name">${t}</div><div class="sdrop-sub">Group ${tg(t)} · tap to view schedule</div></div>
      </div>`
    ).join('') + '</div>';
    // Don't auto-render team — wait for explicit click
    return;
  }

  if (hits.length === 1) {
    drop.innerHTML = '';
    showTeam(hits[0]);
    return;
  }

  drop.innerHTML = '';
  res.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>No team found. Try "France", "USA", or "Brazil".</div>';
  currentTeam = null;
}

function pickTeam(team) {
  document.getElementById('sinput').value = team;
  document.getElementById('sinput2').value = team;
  document.getElementById('sdrop').innerHTML = '';
  showTeam(team);
}

function showTeam(team) {
  currentTeam = team;
  const ms = MATCHES.filter(m => m.h===team||m.a===team);
  const g = tg(team);
  let html = `<div class="back" onclick="clearSearch()"><i class="ti ti-arrow-left"></i> All teams</div>`;
  html += `<div class="team-hdr"><span class="team-hdr-flag">${FLAGS[team]||'🏳️'}</span><div><h2>${team}</h2><p>Group ${g} · ${ms.length} group stage matches</p></div></div>`;
  html += ms.map(m => mcHTML(m, false, false)).join('');
  document.getElementById('sresult').innerHTML = html;
}

function clearSearch() {
  document.getElementById('sinput').value = '';
  document.getElementById('sinput2').value = '';
  document.getElementById('sdrop').innerHTML = '';
  document.getElementById('sresult').innerHTML = '<div class="empty"><i class="ti ti-globe"></i>Type a country name to see their schedule and where to watch.</div>';
  currentTeam = null;
}

// ─── GROUPS VIEW ──────────────────────────────────────────────────────
let selGroup = null;

function renderGroups() {
  const el = document.getElementById('v-groups');
  let html = '<div class="grp-tabs">';
  Object.keys(GROUPS).forEach(g => {
    html += `<button class="gtab${g===selGroup?' on':''}" onclick="selGrp('${g}')">Grp ${g}</button>`;
  });
  html += '</div><div id="grp-body"></div>';
  el.innerHTML = html;

  if (selGroup) {
    renderGroupBody(selGroup);
  } else {
    const grid = document.createElement('div');
    grid.className = 'g-grid';
    Object.keys(GROUPS).forEach(g => {
      let c = `<div class="gcard" onclick="selGrp('${g}')"><div class="gcard-lbl">Group ${g}</div>`;
      GROUPS[g].forEach(t => {
        c += `<div class="gcard-team" onclick="event.stopPropagation();goTeam('${t.replace(/'/g,"\\'")}')">
          <span class="gtf">${FLAGS[t]||'🏳️'}</span><span class="gtn">${t}</span></div>`;
      });
      c += '</div>';
      grid.innerHTML += c;
    });
    document.getElementById('grp-body').appendChild(grid);
  }
}

function selGrp(g) { selGroup = g; renderGroups(); }

function renderGroupBody(g) {
  const teams = GROUPS[g];
  const ms = MATCHES.filter(m => m.g === g);
  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <div class="back" onclick="selGroup=null;renderGroups()" style="margin-bottom:0"><i class="ti ti-arrow-left"></i> All groups</div>
    <span style="font-size:14px;font-weight:500">Group ${g}</span>
  </div>`;
  html += `<div style="background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:10px 12px;margin-bottom:14px">
    <table class="s-tbl"><thead><tr><th></th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
  teams.forEach((t,i) => {
    html += `<tr class="${i<2?'adv':''}">
      <td class="pn">${i+1}</td>
      <td><span style="font-size:14px;margin-right:5px">${FLAGS[t]||'🏳️'}</span><span style="font-weight:500;cursor:pointer" onclick="goTeam('${t.replace(/'/g,"\\'")}'">${t}</span></td>
      <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>`;
  });
  html += `</tbody></table>
    <div style="font-size:10px;color:var(--tx3);margin-top:6px;display:flex;gap:12px">
      <span style="border-left:2px solid #16a34a;padding-left:6px">Advances</span>
      <span style="border-left:2px solid #ca8a04;padding-left:6px">Possible (best 3rd)</span>
    </div></div>`;
  html += `<div class="sec-label">Group ${g} Schedule</div>`;
  html += ms.map(m => mcHTML(m, false, false)).join('');
  document.getElementById('grp-body').innerHTML = html;
}

function goTeam(t) { go('search'); pickTeam(t); }

// ─── NAV ──────────────────────────────────────────────────────────────
let activeView = 'today';
function go(name) {
  activeView = name;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('on', ['today','search','groups','watch'][i] === name);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('v-'+name).classList.add('on');
  document.getElementById('sticky-s').style.display = name === 'search' ? 'block' : 'none';
}

// ─── PWA SETUP ────────────────────────────────────────────────────────
(function(){
  // Build SVG icon as data URI (soccer ball on green)
  const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#0a2416"/><text y="130" x="96" text-anchor="middle" font-size="120">⚽</text></svg>`;
  const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(svgIcon);
  document.getElementById('apple-icon').href = iconUrl;
  document.getElementById('favicon').href = iconUrl;

  // Inline manifest as blob
  const manifest = {
    name: 'World Cup 2026',
    short_name: 'WC 2026',
    description: 'Live FIFA World Cup 2026 scores, schedules and TV listings',
    start_url: '.',
    display: 'standalone',
    background_color: '#0a2416',
    theme_color: '#0a2416',
    orientation: 'portrait-primary',
    icons: [
      {src: iconUrl, sizes: '192x192', type: 'image/svg+xml'},
      {src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable'}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // Service worker for offline support
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'wc2026-v1';
const ICONS_URL = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll([ICONS_URL])).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.anthropic.com')) return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});`;
    const swBlob = new Blob([swCode], {type:'text/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(()=>{});
  }

  // Install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').classList.add('show');
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });

  // On iOS show manual instructions since beforeinstallprompt doesn't fire
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    const banner = document.getElementById('install-banner');
    const btn = document.getElementById('install-btn');
    const txt = banner.querySelector('.install-banner-txt');
    txt.innerHTML = '<strong>Add to Home Screen</strong><span>Tap the Share button then "Add to Home Screen"</span>';
    btn.style.display = 'none';
    banner.classList.add('show');
  }
})();

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
}
