<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WC 2026</title>
<meta name="description" content="2026 FIFA World Cup live scores, schedules, TV listings"/>
<meta name="theme-color" content="#0a2416"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WC 2026"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" id="pwa-manifest"/>
<link rel="apple-touch-icon" id="apple-icon"/>
<link rel="icon" id="favicon"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f4;
  --tx:#1c1c1a;--tx2:#6b6b67;--tx3:#9b9b96;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.17);
  --r:8px;--rl:12px;
  --font:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;
  --tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg2);min-height:100vh;color:var(--tx);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,[onclick]{touch-action:manipulation}

/* ── APP SHELL ── */
.app{max-width:680px;margin:0 auto;padding:12px 12px 88px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#0a2416 0%,#0f3320 100%);border-radius:var(--rl);padding:14px 16px 13px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-30px;top:-30px;width:170px;height:170px;border-radius:50%;border:30px solid rgba(255,255,255,0.04);pointer-events:none}
.hero-flags{display:flex;gap:5px;margin-bottom:7px}
.hf{font-size:17px;opacity:.85}
.hero h1{font-size:16px;font-weight:600;color:#fff;letter-spacing:.1px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.hero-date{font-size:12px;color:rgba(255,255,255,.7);margin-top:8px;font-weight:500}
.hero-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(52,211,153,.13);
  color:#6ee7b7;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;
  border:1px solid rgba(52,211,153,.25);margin-top:6px}

/* ── LIVE BAR ── */
.lbar{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:9px;border-top:1px solid rgba(255,255,255,.08)}
.ldot{width:7px;height:7px;border-radius:50%;background:#6ee7b7;flex-shrink:0}
.ldot.live{background:#ef4444;animation:blink 1.4s infinite}
.ldot.err{background:#f59e0b}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.lstat{font-size:11px;color:rgba(255,255,255,.6);flex:1;line-height:1.4}
.lbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.8);font-size:10px;padding:4px 10px;border-radius:20px;
  cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font);white-space:nowrap}
.lbtn:hover{background:rgba(255,255,255,.18)}
.lbtn:disabled{opacity:.5;cursor:default}
.lbtn i{font-size:12px;transition:transform .6s}
.lbtn.spinning i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}



/* ── TABS ── */
.tabs{display:flex;margin-bottom:12px;border:1px solid var(--bd2);border-radius:var(--r);
  overflow:hidden;background:var(--bg2)}
.tab{flex:1;padding:9px 4px 7px;font-size:12px;font-weight:500;cursor:pointer;
  color:var(--tx3);text-align:center;border:none;border-bottom:2px solid transparent;
  background:transparent;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:color .15s,border-color .15s;font-family:var(--font)}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom:2px solid #2d7a4f}
.tab.on i{color:#2d7a4f}
.tab i{font-size:14px}

/* ── VIEWS ── */
.view{display:none}.view.on{display:block}
.sec-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.7px;margin:0 0 8px}

/* ── MATCH CARD ── */
.mc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
  padding:12px 14px 10px;margin-bottom:9px;transition:border-color .2s}
.mc.usmnt{border-color:#2d7a4f;border-width:1px}
.mc.is-live{border-color:#dc2626;border-width:1px}

.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-grp{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}

/* status badge */
.bdg{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;letter-spacing:.2px}
.bdg-sched{background:var(--bg2);color:var(--tx2)}
.bdg-live{background:#fef2f2;color:#dc2626;animation:blink 1.4s infinite}
.bdg-ht{background:#fff7ed;color:#c2410c}
.bdg-ft{background:#f0fdf4;color:#15803d}

/* teams */
.mc-body{display:flex;align-items:center;gap:4px}
.mc-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:8px 4px;border-radius:var(--r);transition:background .12s;min-height:44px;justify-content:center}
.mc-team:hover{background:var(--bg2)}
.mc-flag{font-size:26px;line-height:1}
.mc-name{font-size:11px;font-weight:500;color:var(--tx);text-align:center;line-height:1.3}
.mc-tap{font-size:9px;color:var(--tx3);margin-top:1px}

/* score / time */
.mc-mid{display:flex;flex-direction:column;align-items:center;min-width:64px;flex-shrink:0}
.mc-score{font-size:26px;font-weight:600;color:var(--tx);letter-spacing:2px;line-height:1}
.mc-time-txt{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:1px}
.mc-vs{font-size:10px;color:var(--tx3)}
.mc-min{font-size:10px;color:#dc2626;font-weight:600;margin-top:2px}

/* footer */
.mc-foot{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);
  display:flex;flex-direction:column;gap:5px}
.mc-venue{font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.mc-venue i{font-size:13px;color:var(--tx3);flex-shrink:0}
.mc-watch{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.wl{font-size:10px;color:var(--tx3)}
.chip{font-size:10px;font-weight:400;padding:2px 7px;border-radius:4px;
  background:var(--bg2);color:var(--tx3);border:1px solid var(--bd)}
.ce,.cs,.cst{background:var(--bg2);color:var(--tx3);border:1px solid var(--bd)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 16px;color:var(--tx2);font-size:13px}
.empty i{font-size:38px;display:block;margin-bottom:10px;color:var(--tx3)}

/* ── SEARCH ── */
.s-wrap{margin-bottom:10px}
.s-row{display:flex;gap:8px;align-items:center}
.s-row input{flex:1;padding:10px 12px;font-size:16px;border:1px solid var(--bd2);
  border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none;
  font-family:var(--font);transition:border-color .15s}
.s-row input:focus{border-color:#2d7a4f}
.s-row button{padding:10px 14px;background:#0a2416;color:#fff;border:none;
  border-radius:var(--r);font-size:13px;cursor:pointer;display:flex;align-items:center;
  gap:4px;font-family:var(--font)}

.sdrop{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rl);
  margin-bottom:10px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.sdi{padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:background .1s}
.sdi:last-child{border-bottom:none}
.sdi:hover{background:var(--bg2)}
.sdi-flag{font-size:20px}
.sdi-name{font-size:13px;font-weight:500;color:var(--tx)}
.sdi-sub{font-size:11px;color:var(--tx2);margin-top:1px}

.team-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;
  background:var(--bg2);border-radius:var(--rl);border:1px solid var(--bd)}
.team-hdr-fl{font-size:34px}
.team-hdr h2{font-size:15px;font-weight:600;color:var(--tx)}
.team-hdr p{font-size:12px;color:var(--tx2);margin-top:2px}

/* ── BACK BTN ── */
.back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);
  cursor:pointer;padding:5px 9px;border:1px solid var(--bd2);border-radius:var(--r);
  background:var(--bg);margin-bottom:12px;font-family:var(--font)}
.back:hover{background:var(--bg2)}

/* ── GROUPS ── */
.g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:4px}
.gcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
  padding:10px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.gcard:hover{border-color:#2d7a4f;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.gcard-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:7px}
.gct{display:flex;align-items:center;gap:6px;padding:3px 0;border-radius:4px}
.gct:hover .gctn{color:#2d7a4f;text-decoration:underline}
.gctf{font-size:15px}
.gctn{font-size:12px;color:var(--tx);transition:color .12s}

.gtabs{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;
  padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.gtabs::-webkit-scrollbar{display:none}
.gtab{padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);
  background:var(--bg);border:1px solid var(--bd);border-radius:20px;
  font-family:var(--font);transition:all .14s;flex-shrink:0;white-space:nowrap}
.gtab:hover{border-color:#2d7a4f;color:var(--tx)}
.gtab.on{background:#0a2416;color:#fff;border-color:#0a2416}

/* ── STANDINGS ── */
.stbl-wrap{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
  padding:10px 12px;margin-bottom:14px;overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;font-size:12px;min-width:280px}
.stbl th{text-align:left;padding:4px 8px;color:var(--tx3);font-weight:600;
  border-bottom:1px solid var(--bd2);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.stbl td{padding:7px 8px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr.adv td:first-child{border-left:2px solid #16a34a;padding-left:6px}
.stbl tr.maybe td:first-child{border-left:2px solid #ca8a04;padding-left:6px}
.stbl-pos{color:var(--tx3);font-size:11px;width:20px}
.stbl-flag{font-size:14px;margin-right:5px}
.stbl-name{font-weight:500;cursor:pointer}
.stbl-name:hover{color:#2d7a4f;text-decoration:underline}
.stbl-key{display:flex;gap:12px;margin-top:7px}
.stbl-key span{font-size:10px;color:var(--tx3)}
.stbl-key span.adv{border-left:2px solid #16a34a;padding-left:5px}
.stbl-key span.maybe{border-left:2px solid #ca8a04;padding-left:5px}

/* ── WATCH GUIDE ── */
.wg{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
  padding:12px 14px;margin-bottom:12px}
.wg-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.wg-title i{font-size:15px;color:var(--tx3)}
.wr{display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid var(--bd)}
.wr:last-child{border-bottom:none}
.wr-name{font-size:13px;font-weight:500;color:var(--tx)}
.wr-desc{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4}
.wtag{font-size:11px;padding:2px 9px;border-radius:4px;font-weight:500;
  white-space:nowrap;margin-left:10px;flex-shrink:0;align-self:flex-start;margin-top:2px}

/* ── HERO SEARCH PILL ── */
.hero-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.hero-search-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 10px 4px 8px;
  cursor:pointer;transition:background .15s;flex-shrink:0}
.hero-search-pill:hover{background:rgba(255,255,255,.18)}
.hero-search-pill i{font-size:13px;color:rgba(255,255,255,.7)}
.hero-search-pill span{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap}

/* ── TEAM SEARCH MODAL ── */
.tsm{position:fixed;inset:0;z-index:400;display:none;align-items:flex-start;
  justify-content:center;padding-top:60px;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.tsm.show{display:flex}
.tsm-box{background:var(--bg);border-radius:var(--rl);width:calc(100% - 32px);
  max-width:480px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.tsm-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;
  border-bottom:1px solid var(--bd)}
.tsm-input{flex:1;font-size:16px;border:none;outline:none;background:transparent;
  color:var(--tx);font-family:var(--font)}
.tsm-input::placeholder{color:var(--tx3)}
.tsm-close{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;
  padding:0;line-height:1;flex-shrink:0}
.tsm-results{max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tsm-empty{padding:28px 16px;text-align:center;color:var(--tx3);font-size:13px}
.tsm-item{padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:background .1s}
.tsm-item:last-child{border-bottom:none}
.tsm-item:hover,.tsm-item:active{background:var(--bg2)}
.tsm-flag{font-size:22px;flex-shrink:0}
.tsm-name{font-size:14px;font-weight:500;color:var(--tx)}
.tsm-sub{font-size:11px;color:var(--tx2);margin-top:2px}

/* ── BRACKET VIEW ── */
.bracket-stage{margin-bottom:20px}
.bracket-stage-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bracket-stage-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.bracket-matches{display:flex;flex-direction:column;gap:7px}
.bmc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
  padding:10px 14px;display:flex;align-items:center;gap:10px}
.bmc.final{border-color:#2d7a4f;border-width:1.5px}
.bmc-teams{flex:1;display:flex;flex-direction:column;gap:5px}
.bmc-team{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx2)}
.bmc-team.winner{color:var(--tx);font-weight:600}
.bmc-flag{font-size:16px;width:20px;text-align:center}
.bmc-name{flex:1}
.bmc-score{font-size:13px;font-weight:600;color:var(--tx);min-width:18px;text-align:right}
.bmc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.bmc-date{font-size:10px;color:var(--tx3);white-space:nowrap}
.bmc-time{font-size:10px;color:var(--tx3);white-space:nowrap}
.bmc-venue{font-size:10px;color:var(--tx3);white-space:nowrap}
.bmc-tbd{font-size:11px;color:var(--tx3);font-style:italic}


</style>
</head>
<body>
<div class="app">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-flags"><span class="hf">🇺🇸</span><span class="hf">🇨🇦</span><span class="hf">🇲🇽</span></div>
    <h1>FIFA World Cup 2026™</h1>
    <div class="hero-sub">48 teams · 104 matches · June 11 – July 19</div>
    <div class="hero-date" id="hero-date"></div>
    <div class="hero-row">
      <div class="hero-pill">⚽ Group Stage</div>
      <button type="button" class="hero-search-pill" onclick="openTeamSearch()">
        <i class="ti ti-search"></i>
        <span>Find a Team</span>
      </button>
    </div>
    <div class="lbar">
      <span class="ldot" id="ldot"></span>
      <span class="lstat" id="lstat">Connecting…</span>
      <button type="button" class="lbtn" id="lbtn" onclick="fetchScores(true)">
        <i class="ti ti-refresh" id="lico"></i> Refresh
      </button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button type="button" class="tab on" onclick="go('today')"><i class="ti ti-calendar-event"></i>Today</button>
    <button type="button" class="tab"    onclick="go('groups')"><i class="ti ti-layout-grid"></i>Groups</button>
    <button type="button" class="tab"    onclick="go('bracket')"><i class="ti ti-tournament"></i>Bracket</button>
    <button type="button" class="tab"    onclick="go('watch')"><i class="ti ti-device-tv"></i>Watch</button>
  </div>

  <div id="v-today"   class="view on"></div>
  <div id="v-bracket" class="view"></div>
  <div id="v-groups"  class="view"></div>
  <div id="v-watch"   class="view"></div>
</div>

<!-- TEAM SEARCH MODAL -->
<div class="tsm" id="tsm" onclick="tsClickOutside(event)">
  <div class="tsm-box" id="tsm-box">
    <div class="tsm-hdr">
      <i class="ti ti-search" style="color:var(--tx3);font-size:16px;flex-shrink:0"></i>
      <input type="text" class="tsm-input" id="tsm-input"
             placeholder="Search any country…"
             oninput="onTeamSearch(this.value)" autocomplete="off"/>
      <button type="button" class="tsm-close" onclick="closeTeamSearch()">✕</button>
    </div>
    <div class="tsm-results" id="tsm-results">
      <div class="tsm-empty">Type a country name to see their schedule and group standings</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — paste your free token from football-data.org
// ═══════════════════════════════════════════════════════
const API_TOKEN = '218f08fc1e0d426198e0ab1b1bc25c57';
const API_BASE  = 'https://api.football-data.org/v4';
const WC_CODE   = 'WC'; // World Cup competition code

// ═══════════════════════════════════════════════════════
// TIMEZONE — all times displayed in US Eastern (ET)
// ═══════════════════════════════════════════════════════
function nowET() {
  return new Date(new Date().toLocaleString('en-US', {timeZone:'America/New_York'}));
}
function todayET() {
  const d = nowET();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtMatchDate(dateStr) {
  // "2026-06-21" → "Sun Jun 21"
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function fmtUpdated() {
  return nowET().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'});
}

// ═══════════════════════════════════════════════════════
// FLAGS + GROUPS
// ═══════════════════════════════════════════════════════
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czechia':'🇨🇿',
  'Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼',"Côte d'Ivoire":'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',

};

function normTeam(name) {
  return FD_NAMES[name] || name;
}

function liveKey(home, away) {
  return `${home}|${away}`;
}

function fdToSt(s) {
  if (!s) return 'sched';
  const u = s.toUpperCase();
  if (['IN_PLAY','LIVE','PAUSED'].includes(u)) return 'live';
  if (u === 'HALF_TIME') return 'ht';
  if (['FINISHED','AWARDED','COMPLETED'].includes(u)) return 'ft';
  if (['TIMED','SCHEDULED'].includes(u)) return 'sched';
  return 'sched';
}

function getLive(m) {
  // Check API data first, fall back to hardcoded sc/st
  return LIVE[liveKey(m.h, m.a)] || { sc: m.sc, st: m.st, min: null };
}

// ═══════════════════════════════════════════════════════
// LIVE SCORE FETCH — football-data.org v4
// Fetches ALL tournament matches (not just today) so every
// tab — Today, Teams, Groups — always has complete data.
// ═══════════════════════════════════════════════════════
let _refreshTimer = null;
let _fetchInProgress = false;

async function fetchScores(manual = false) {
  if (_fetchInProgress && !manual) return;
  _fetchInProgress = true;

  const btn  = document.getElementById('lbtn');
  const ico  = document.getElementById('lico');
  const stat = document.getElementById('lstat');
  const dot  = document.getElementById('ldot');

  btn.disabled = true;
  btn.classList.add('spinning');

  if (!API_TOKEN || API_TOKEN === 'YOUR_TOKEN_HERE') {
    stat.textContent = 'Add free API token to enable live scores';
    dot.className = 'ldot err';

    btn.disabled = false;
    btn.classList.remove('spinning');
    _fetchInProgress = false;
    syncAllViews();
    scheduleNext();
    return;
  }

  try {
    // ── Fetch ALL WC matches (group stage = matchdays 1-4 + live) ──
    // football-data.org free tier: fetch full competition match list
    // This gives us every result past, present and scheduled in one call.
    const url = `${API_BASE}/competitions/${WC_CODE}/matches`;
    const res = await fetch(url, {
      headers: { 'X-Auth-Token': API_TOKEN, 'Accept': 'application/json' }
    });

    if (res.status === 401 || res.status === 403) throw new Error('Token rejected — check football-data.org token');
    if (res.status === 429) throw new Error('Rate limited — retrying in 5 min');
    if (!res.ok) throw new Error(`API ${res.status}`);

    const json = await res.json();
    const all  = json.matches || [];

    // ── Rebuild LIVE map from every match returned ──
    LIVE = {};
    for (const am of all) {
      const rawH = am.homeTeam?.name || am.homeTeam?.shortName || '';
      const rawA = am.awayTeam?.name || am.awayTeam?.shortName || '';
      const home = normTeam(rawH);
      const away = normTeam(rawA);
      if (!home || !away) continue;

      const st = fdToSt(am.status);

      // Score priority: fullTime → currentScore (in-play) → halfTime → null
      let hs = null, as_ = null;
      if (am.score?.fullTime?.home != null) {
        hs  = am.score.fullTime.home;
        as_ = am.score.fullTime.away;
      } else if (am.score?.regularTime?.home != null) {
        hs  = am.score.regularTime.home;
        as_ = am.score.regularTime.away;
      } else if (am.score?.halfTime?.home != null && st !== 'sched') {
        hs  = am.score.halfTime.home;
        as_ = am.score.halfTime.away;
      }

      const sc  = (hs !== null && as_ !== null) ? `${hs}-${as_}` : null;
      const min = am.minute ?? null;

      // Store by home|away key AND away|home so look-ups always hit
      LIVE[liveKey(home, away)] = { sc, st, min };
      LIVE[liveKey(away, home)] = {
        sc: sc ? sc.split('-').reverse().join('-') : null,
        st, min
      };
    }

    // ── Status summary ──
    const liveNow   = all.filter(m => fdToSt(m.status) === 'live').length;
    const htNow     = all.filter(m => fdToSt(m.status) === 'ht').length;
    const completed = all.filter(m => fdToSt(m.status) === 'ft').length;

    // ── Update live indicator ──
    dot.className = liveNow > 0 ? 'ldot live' : 'ldot';
    if (liveNow > 0 || htNow > 0) {
      const playing = liveNow + htNow;
      stat.textContent = `🔴 ${playing} match${playing > 1 ? 'es' : ''} in progress · ${fmtUpdated()} ET`;
    } else if (completed > 0) {
      stat.textContent = `${completed} result${completed > 1 ? 's' : ''} recorded · Updated ${fmtUpdated()} ET`;
    } else {
      stat.textContent = `Live data ready · Updated ${fmtUpdated()} ET`;
    }

    // ── Sync every view with fresh data ──
    syncAllViews();

  } catch(err) {
    dot.className = 'ldot err';
    // Show friendly message, not raw error
    const msg = err.message || 'Connection error';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      stat.textContent = 'No connection — showing cached data';
    } else {
      stat.textContent = `⚠ ${msg.slice(0, 55)}`;
    }
    console.warn('[WC2026] Score fetch failed:', msg);
    syncAllViews(); // still re-render with whatever we have
  }

  btn.disabled = false;
  btn.classList.remove('spinning');
  _fetchInProgress = false;
  scheduleNext();
}

// ── Re-render every open view with latest LIVE data ──
function syncAllViews() {
  if (_todayTeam) {
    document.getElementById('v-today').innerHTML = buildTeamHTML(_todayTeam, 'closeTodayTeam()');
  } else {
    renderToday();
  }
  renderGroups();
  // If team search modal is open, refresh it
  if (currentTeam && document.getElementById('tsm').classList.contains('show')) {
    showTeamInModal(currentTeam);
  }
}

function scheduleNext() {
  clearTimeout(_refreshTimer);
  // Live match in progress → poll every 45s
  // Games scheduled today → poll every 3min
  // Nothing today → poll every 10min
  const hasLive  = Object.values(LIVE).some(x => x.st === 'live' || x.st === 'ht');
  const todayKey = todayET();
  const hasToday = MATCHES.some(m => m.date === todayKey);
  const delay    = hasLive ? 45000 : hasToday ? 3 * 60000 : 10 * 60000;
  _refreshTimer  = setTimeout(() => fetchScores(false), delay);
}

function matchCard(m, tapTeams) {
  const lv = getLive(m);
  const st = lv.st || m.st;
  const sc = lv.sc || m.sc;
  const isUSA = m.h === 'United States' || m.a === 'United States';

  // Badge
  let bdgCls, bdgTxt;
  if (st === 'live') { bdgCls = 'bdg-live'; bdgTxt = lv.min ? `${lv.min}′ LIVE` : 'LIVE'; }
  else if (st === 'ht') { bdgCls = 'bdg-ht'; bdgTxt = 'Half Time'; }
  else if (st === 'ft') { bdgCls = 'bdg-ft'; bdgTxt = 'Full Time'; }
  else { bdgCls = 'bdg-sched'; bdgTxt = m.kick; }

  // Center block
  let midHTML;
  if ((st === 'ft' || st === 'ht' || st === 'live') && sc) {
    midHTML = `<span class="mc-score">${sc}</span>`;
    if (st === 'live' && lv.min) midHTML += `<span class="mc-min">${lv.min}′</span>`;
  } else {
    midHTML = `<span class="mc-time-txt">${m.kick}</span><span class="mc-vs">vs</span>`;
  }

  const tv  = m.tv.map(x  => `<span class="chip ce">${x}</span>`).join('');
  const tvs = m.tvs.map(x => `<span class="chip cs">${x}</span>`).join('');
  const str = m.str.map(x => `<span class="chip cst">${x}</span>`).join('');

  // Every team is always tappable — opens overlay from any tab
  const hClick = `onclick="showTeamOverlay('${m.h.replace(/'/g,"\\'")}',event)"`;
  const aClick = `onclick="showTeamOverlay('${m.a.replace(/'/g,"\\'")}',event)"`;
  const hint   = tapTeams ? `<span class="mc-tap">tap for schedule</span>` : '';

  return `<div class="mc${isUSA ? ' usmnt' : ''}${st === 'live' ? ' is-live' : ''}">
  <div class="mc-top">
    <span class="mc-grp">Group ${m.g}</span>
    <span class="bdg ${bdgCls}">${bdgTxt}</span>
  </div>
  <div class="mc-body">
    <div class="mc-team" ${hClick}>
      <span class="mc-flag">${FLAGS[m.h]||'🏳️'}</span>
      <span class="mc-name">${m.h}</span>${hint}
    </div>
    <div class="mc-mid">${midHTML}</div>
    <div class="mc-team" ${aClick}>
      <span class="mc-flag">${FLAGS[m.a]||'🏳️'}</span>
      <span class="mc-name">${m.a}</span>${hint}
    </div>
  </div>
  <div class="mc-foot">
    <div class="mc-venue"><i class="ti ti-calendar"></i>${fmtMatchDate(m.date)}</div>
    <div class="mc-venue"><i class="ti ti-map-pin"></i>${m.v} · ${m.c}</div>
    <div class="mc-watch">
      <span class="wl">English:</span>${tv}
      <span class="wl" style="margin-left:4px">Spanish:</span>${tvs}
      <span class="wl" style="margin-left:4px">Stream:</span>${str}
    </div>
  </div>
</div>`;
}

// ── buildTeamHTML: shared by Today inline view, Teams tab, Groups tab ──
function buildTeamHTML(team, backFn) {
  const g  = teamGroup(team);
  const ms = MATCHES.filter(m => m.h === team || m.a === team);
  const {sorted, stats} = calcStandings(g);

  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button type="button" class="back" onclick="${backFn}" style="margin-bottom:0">
        <i class="ti ti-arrow-left"></i> Back
      </button>
      <span style="font-size:14px;font-weight:600;color:var(--tx)">
        ${FLAGS[team]||'🏳️'} ${team}
      </span>
    </div>
    <div class="sec-lbl">Group ${g} Standings</div>
    <div class="stbl-wrap" style="margin-bottom:18px">
      <table class="stbl">
        <thead><tr>
          <th></th><th>Team</th>
          <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
        </tr></thead>
        <tbody>`;

  sorted.forEach((t, i) => {
    const s     = stats[t];
    const gdStr = s.gd > 0 ? `+${s.gd}` : `${s.gd}`;
    const isSel = t === team;
    const cls   = i < 2 ? 'adv' : i === 2 ? 'maybe' : '';
    html += `<tr class="${cls}" style="${isSel ? 'background:var(--bg2)' : ''}">
      <td class="stbl-pos">${i+1}</td>
      <td>
        <span class="stbl-flag">${FLAGS[t]||'🏳️'}</span>
        <span class="stbl-name" style="${isSel ? 'font-weight:700' : ''}"
              onclick="showTeamOverlay('${t.replace(/'/g,"\'")}',event)">${t}</span>
      </td>
      <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
      <td>${s.p > 0 ? gdStr : '—'}</td>
      <td style="font-weight:${s.pts>0?'700':'400'};color:${s.pts>=3?'#16a34a':'var(--tx)'}">${s.pts}</td>
    </tr>`;
  });

  html += `</tbody></table>
      <div class="stbl-key">
        <span class="adv">Advances</span>
        <span class="maybe">Possible (best 3rd)</span>
      </div>
    </div>
    <div class="sec-lbl">${team} — All Matches</div>
    ${ms.map(m => matchCard(m, false)).join('')}`;

  return html;
}

// TODAY VIEW
// ═══════════════════════════════════════════════════════
function yesterdayET() {
  const d = nowET();
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderToday() {
  const el = document.getElementById('v-today');
  const today = todayET();
  const yesterday = yesterdayET();
  const hourET = nowET().getHours(); // 0-23 in ET

  // Hero date in ET
  const d = nowET();
  document.getElementById('hero-date').textContent =
    d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

  // Today's full slate = today's matches + any 12:00 AM matches dated tomorrow
  // (midnight ET games belong to the previous evening's schedule but land on the next date)
  const tomorrowET = (() => {
    const d = nowET(); d.setDate(d.getDate() + 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  const midnightNext = MATCHES.filter(m => m.date === tomorrowET && m.kick.startsWith('12:00 AM'));
  const lateYesterday = hourET < 2
    ? MATCHES.filter(m => m.date === yesterday && m.kick.startsWith('12:00 AM'))
    : [];
  const todayMs = [...lateYesterday, ...MATCHES.filter(m => m.date === today), ...midnightNext];

  if (!todayMs.length) {
    // Find next match day
    const upcoming = MATCHES.filter(m => m.date > today);
    const nextDate = upcoming.length ? upcoming[0].date : null;
    if (nextDate) {
      const nextMs = upcoming.filter(m => m.date === nextDate);
      const nd = new Date(nextDate + 'T12:00:00');
      const label = nd.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
      el.innerHTML = `<div class="empty"><i class="ti ti-calendar-event"></i>No matches today.<br><span style="font-size:12px;color:var(--tx3)">Next up: ${label}</span></div>`;
    } else {
      el.innerHTML = `<div class="empty"><i class="ti ti-trophy"></i>Group stage complete.</div>`;
    }
    return;
  }

  el.innerHTML = todayMs.map(m => matchCard(m, true)).join('');
}

function onTeamSearch(v) {
  const q   = v.trim().toLowerCase();
  const res = document.getElementById('tsm-results');

  if (!q) {
    res.innerHTML = '<div class="tsm-empty">Type a country name to see their schedule and group standings</div>';
    return;
  }

  const hits = Object.keys(FLAGS).filter(t => t.toLowerCase().includes(q));
  if (!hits.length) {
    res.innerHTML = '<div class="tsm-empty">No team found — try "USA", "France" or "Brazil"</div>';
    return;
  }

  const exact = hits.find(t => t.toLowerCase() === q);
  if (exact || hits.length === 1) {
    showTeamInModal(exact || hits[0]);
    return;
  }

  res.innerHTML = hits.slice(0, 10).map(t =>
    `<div class="tsm-item" onclick="showTeamInModal('${t.replace(/'/g,"\'")}')">
      <span class="tsm-flag">${FLAGS[t]||'🏳️'}</span>
      <div><div class="tsm-name">${t}</div>
           <div class="tsm-sub">Group ${teamGroup(t)}</div></div>
    </div>`).join('');
}

        <span class="gctn">${t}</span>${ptsStr}
      </div>`;
    });
    grid += '</div>';
  });
  grid += '</div>';
  document.getElementById('grp-body').innerHTML = grid;
}

// ─── Calculate live standings for a group ───────────────────────
function calcStandings(g) {
  const teams = GROUPS[g];
  const ms    = MATCHES.filter(m => m.g === g);
  const stats = {};
  teams.forEach(t => { stats[t] = {p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });

  ms.forEach(m => {
    const lv = getLive(m);
    const sc = lv.sc || m.sc;
    const st = lv.st || m.st;
    if (!sc || st === 'sched') return;
    const parts = sc.split('-');
    if (parts.length !== 2) return;
    const hg = parseInt(parts[0], 10);
    const ag = parseInt(parts[1], 10);
    if (isNaN(hg) || isNaN(ag)) return;
    if (!stats[m.h] || !stats[m.a]) return;

    stats[m.h].p++; stats[m.a].p++;
    stats[m.h].gf += hg; stats[m.h].ga += ag;
    stats[m.a].gf += ag; stats[m.a].ga += hg;

    if (hg > ag)      { stats[m.h].w++; stats[m.h].pts+=3; stats[m.a].l++; }
    else if (hg < ag) { stats[m.a].w++; stats[m.a].pts+=3; stats[m.h].l++; }
    else              { stats[m.h].d++; stats[m.h].pts++; stats[m.a].d++; stats[m.a].pts++; }
  });

  teams.forEach(t => { stats[t].gd = stats[t].gf - stats[t].ga; });

  const sorted = [...teams].sort((a,b) => {
    if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
    if (stats[b].gd  !== stats[a].gd)  return stats[b].gd  - stats[a].gd;
    if (stats[b].gf  !== stats[a].gf)  return stats[b].gf  - stats[a].gf;
    return a.localeCompare(b);
  });
  return {sorted, stats};
}

function renderGroupBody(g) {

// PWA — manifest + service worker + install prompt
// ═══════════════════════════════════════════════════════
(function initPWA() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="38" fill="#0a2416"/><text x="96" y="134" text-anchor="middle" font-size="110">⚽</text></svg>`;
  const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(svg);
  document.getElementById('apple-icon').href = iconUrl;
  document.getElementById('favicon').href    = iconUrl;

  const manifest = {
    name:'World Cup 2026', short_name:'WC 2026',
    description:'Live 2026 FIFA World Cup scores, schedules & TV listings',
    start_url:'.', display:'standalone',
    background_color:'#0a2416', theme_color:'#0a2416',
    orientation:'portrait-primary',
    icons:[{src:iconUrl,sizes:'192x192',type:'image/svg+xml'},
           {src:iconUrl,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // Service worker (blob URLs work Chrome/Firefox/iOS 16.4+)
  if ('serviceWorker' in navigator) {
    try {
    const sw = `
const C='wc2026-v2';
self.addEventListener('install',e=>{self.skipWaiting()});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  // Skip non-GET and API calls entirely — let them go direct
  if(e.request.method!=='GET') return;
  if(e.request.url.includes('football-data.org')) return;
  if(e.request.url.includes('api.anthropic.com')) return;
  // Network-first with cache fallback for everything else
  e.respondWith(
    fetch(e.request).then(r=>{
      if(r.ok){const rc=r.clone();caches.open(C).then(c=>c.put(e.request,rc));}
      return r;
    }).catch(()=>caches.match(e.request).then(c=>c||new Response('Offline',{status:503})))
  );
});`;
    const swBlob = new Blob([sw], {type:'text/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    } catch(e) {}
  }

  // Android install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Could show a custom install button here
  });

  // iOS install tip
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  if (isIOS && !navigator.standalone) {
    const ios = document.createElement('div');
    ios.style.cssText = 'background:#1a3a28;border:1px solid rgba(110,231,183,.15);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.5';
    ios.innerHTML = '📲 <strong style="color:#6ee7b7">Install as app:</strong> Tap the Share button in Safari → "Add to Home Screen"';
    const app = document.querySelector('.app');
    app.insertBefore(ios, app.firstChild);
  }
})();
